<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LUME — Cam Frame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     EDIT THESE TWO LINES TO CUSTOMIZE
     ============================================================ */
  :root{
    --channel-name: "RENDY";
    --game-name: "WAR THUNDER";
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:transparent; overflow:hidden;
    font-family:'Inter',sans-serif;
  }
  :root{
    --line:#E7E2D6;
    --accent:#C7A869;
    --ink:#F5F2EA;
    --dim:rgba(231,226,214,.18);
  }

  .stage{position:fixed; inset:0;}

  /* frame draws itself once, then stays */
  .ln{position:absolute; background:var(--line);}
  .ln-top{top:0; left:0; height:1px; width:100%; transform-origin:left; transform:scaleX(0); animation:drawH .9s cubic-bezier(.4,0,.2,1) forwards;}
  .ln-right{top:0; right:0; width:1px; height:100%; transform-origin:top; transform:scaleY(0); animation:drawV .9s cubic-bezier(.4,0,.2,1) forwards .85s;}
  .ln-bottom{bottom:0; left:0; height:1px; width:100%; transform-origin:right; transform:scaleX(0); animation:drawH .9s cubic-bezier(.4,0,.2,1) forwards 1.7s;}
  .ln-left{top:0; left:0; width:1px; height:100%; transform-origin:bottom; transform:scaleY(0); animation:drawV .9s cubic-bezier(.4,0,.2,1) forwards 2.55s;}
  @keyframes drawH{ to{transform:scaleX(1);} }
  @keyframes drawV{ to{transform:scaleY(1);} }

  /* one quiet ambient accent, bottom-right corner */
  .breath{
    position:absolute; right:0; bottom:0; width:140px; height:140px;
    background:radial-gradient(circle at 100% 100%, rgba(199,168,105,.16), transparent 70%);
    opacity:0; animation:fadeIn 1s ease forwards 3.4s, breathe 5s ease-in-out infinite 4.4s;
    pointer-events:none;
  }
  @keyframes fadeIn{ to{opacity:1;} }
  @keyframes breathe{ 0%,100%{opacity:.5;} 50%{opacity:1;} }

  .bottom-left{
    position:absolute; left:1.4em; bottom:1.1em;
    opacity:0; animation:fadeIn 1s ease forwards 3.2s;
  }
  .channel{
    font-family:'Sora',sans-serif; font-weight:600; font-size:15px;
    color:var(--ink); letter-spacing:.04em; text-transform:uppercase;
  }
  .rule{
    width:34px; height:1px; background:var(--accent); margin-bottom:.5em;
  }

  .bottom-right{
    position:absolute; right:1.4em; bottom:1.1em;
    display:flex; align-items:center; gap:.5em;
    opacity:0; animation:fadeIn 1s ease forwards 3.6s;
  }
  .dot{
    width:6px; height:6px; border-radius:50%; background:var(--accent);
    animation:pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.35;}}
  .live{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.22em;
    color:var(--accent);
  }

  .top-right{
    position:absolute; right:1.4em; top:1.1em; text-align:right;
    opacity:0; animation:fadeIn 1s ease forwards 3.2s;
  }
  .game-eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.2em;
    color:var(--dim); color:rgba(231,226,214,.55);
  }
  .game-name{
    font-family:'Sora',sans-serif; font-weight:500; font-size:13px;
    color:var(--ink); letter-spacing:.03em; margin-top:.15em;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="ln ln-top"></div>
  <div class="ln ln-right"></div>
  <div class="ln ln-bottom"></div>
  <div class="ln ln-left"></div>
  <div class="breath"></div>

  <div class="bottom-left">
    <div class="rule"></div>
    <div class="channel" id="channelLabel"></div>
  </div>

  <div class="bottom-right">
    <span class="dot"></span>
    <span class="live">LIVE</span>
  </div>

  <div class="top-right">
    <div class="game-eyebrow">PLAYING</div>
    <div class="game-name" id="gameLabel"></div>
  </div>
</div>

<script>
  const css = getComputedStyle(document.documentElement);
  const strip = v => v.trim().replace(/^"|"$/g,'');
  document.getElementById('channelLabel').textContent = strip(css.getPropertyValue('--channel-name')) || 'CHANNEL';
  document.getElementById('gameLabel').textContent = strip(css.getPropertyValue('--game-name')) || 'GAME';
</script>
</body>
</html>
