<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LUME — Transition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:#121214; overflow:hidden;
    font-family:'Inter',sans-serif;
  }
  :root{ --line:#E7E2D6; --accent:#C7A869; --ink:#F5F2EA; }

  .stage{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}

  /* frame draws itself once around the full screen */
  .ln{position:absolute; background:rgba(231,226,214,.4);}
  .ln-top{top:5%; left:5%; height:1px; width:90%; transform-origin:left; transform:scaleX(0); animation:drawH 1s cubic-bezier(.4,0,.2,1) forwards;}
  .ln-right{top:5%; right:5%; width:1px; height:90%; transform-origin:top; transform:scaleY(0); animation:drawV 1s cubic-bezier(.4,0,.2,1) forwards .9s;}
  .ln-bottom{bottom:5%; left:5%; height:1px; width:90%; transform-origin:right; transform:scaleX(0); animation:drawH 1s cubic-bezier(.4,0,.2,1) forwards 1.8s;}
  .ln-left{top:5%; left:5%; width:1px; height:90%; transform-origin:bottom; transform:scaleY(0); animation:drawV 1s cubic-bezier(.4,0,.2,1) forwards 2.7s;}
  @keyframes drawH{ to{transform:scaleX(1);} }
  @keyframes drawV{ to{transform:scaleY(1);} }

  .content{
    position:relative; text-align:center; z-index:2;
    opacity:0; animation:fadeUp .9s ease forwards 1.3s;
  }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

  .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.5em;
    color:var(--accent); margin-bottom:.9em;
  }
  .title{
    font-family:'Sora',sans-serif; font-weight:600; font-size:clamp(34px,6vw,68px);
    color:var(--ink); letter-spacing:.03em;
  }
  .rule{
    width:0; height:1px; background:var(--accent); margin:1em auto 0;
    animation:growRule .9s ease forwards 2.2s;
  }
  @keyframes growRule{ to{width:120px;} }

  .countdown{
    margin-top:1.1em; font-family:'IBM Plex Mono',monospace; font-weight:500;
    font-size:clamp(18px,2.4vw,26px); color:var(--ink); letter-spacing:.15em;
    opacity:.85; display:none;
  }
  .game-tag{
    margin-top:1.6em; font-family:'IBM Plex Mono',monospace; font-size:11px;
    letter-spacing:.18em; color:rgba(245,242,234,.5);
  }
</style>
</head>
<body>
<div class="stage">
  <div class="ln ln-top"></div>
  <div class="ln ln-right"></div>
  <div class="ln ln-bottom"></div>
  <div class="ln ln-left"></div>

  <div class="content">
    <div class="eyebrow" id="eyebrow">SIGNAL</div>
    <div class="title" id="title">STARTING SOON</div>
    <div class="rule"></div>
    <div class="countdown" id="countdown"></div>
    <div class="game-tag" id="gameTag">PLAYING — VALORANT</div>
  </div>
</div>

<script>
  /* ============================================================
     USAGE — set these in the OBS Browser Source URL, e.g.:
     transition.html?mode=starting&countdown=300&game=MINECRAFT
     transition.html?mode=brb
     transition.html?mode=ending
     transition.html?text=TECH%20BREAK
     ============================================================ */
  const params = new URLSearchParams(location.search);
  const mode = (params.get('mode') || '').toLowerCase();

  const presets = {
    starting: { eyebrow:'SIGNAL INCOMING', title:'STARTING SOON' },
    brb:      { eyebrow:'STAND BY',        title:'BE RIGHT BACK' },
    ending:   { eyebrow:'SIGNAL LOST',     title:'STREAM ENDED' },
  };

  const preset = presets[mode];
  const titleText = (params.get('text') || (preset && preset.title) || 'STARTING SOON').toUpperCase();
  document.getElementById('title').textContent = titleText;
  document.getElementById('eyebrow').textContent = (preset && preset.eyebrow) || 'SIGNAL';

  const game = params.get('game');
  document.getElementById('gameTag').textContent = game ? `PLAYING — ${game.toUpperCase()}` : 'PLAYING — VALORANT';

  const countdownSec = parseInt(params.get('countdown'), 10);
  if(!isNaN(countdownSec) && countdownSec > 0){
    let remaining = countdownSec;
    const cd = document.getElementById('countdown');
    cd.style.display = 'block';
    const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    cd.textContent = fmt(remaining);
    const timer = setInterval(()=>{
      remaining--;
      if(remaining <= 0){ clearInterval(timer); cd.textContent = '00:00'; return; }
      cd.textContent = fmt(remaining);
    }, 1000);
  }
</script>
</body>
</html>
