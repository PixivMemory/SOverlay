<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LUME — Chat Frame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Set --demo-mode:0 once a real chat widget is layered under this frame. */
  :root{ --demo-mode: 1; }

  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:transparent; overflow:hidden;
    font-family:'Inter',sans-serif;
  }
  :root{ --line:#E7E2D6; --accent:#C7A869; --ink:#F5F2EA; }

  .panel{position:fixed; inset:0; display:flex; flex-direction:column;}

  .head{
    flex-shrink:0; padding:.9em 1.1em .7em;
    border-bottom:1px solid rgba(231,226,214,.25);
  }
  .head .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.28em;
    color:var(--accent);
  }
  .head .title{
    font-family:'Sora',sans-serif; font-weight:600; font-size:17px;
    color:var(--ink); margin-top:.15em; letter-spacing:.02em;
  }

  .feed{
    flex:1; overflow:hidden; position:relative;
    padding:.8em 1.1em;
    -webkit-mask-image:linear-gradient(180deg, transparent 0%, #000 6%, #000 90%, transparent 100%);
            mask-image:linear-gradient(180deg, transparent 0%, #000 6%, #000 90%, transparent 100%);
  }
  .msg{
    padding-bottom:.7em; margin-bottom:.7em;
    border-bottom:1px solid rgba(231,226,214,.10);
    opacity:0; transform:translateY(6px);
    animation:msgIn .5s ease forwards;
  }
  .msg:last-child{border-bottom:none;}
  @keyframes msgIn{ to{opacity:1; transform:translateY(0);} }
  .msg .user{
    font-family:'Sora',sans-serif; font-weight:600; font-size:12.5px;
    color:var(--accent); letter-spacing:.03em; text-transform:uppercase;
    display:block; margin-bottom:.2em;
  }
  .msg .text{
    font-size:14.5px; color:var(--ink); line-height:1.4; opacity:.92;
  }
</style>
</head>
<body>
<div class="panel">
  <div class="head">
    <div class="eyebrow">LIVE</div>
    <div class="title">Chat</div>
  </div>
  <div class="feed" id="feed"></div>
</div>

<script>
  const DEMO = getComputedStyle(document.documentElement).getPropertyValue('--demo-mode').trim() !== '0';

  const sample = [
    ["jett_enjoyer", "clean rotation that round"],
    ["mc_builder", "that base design is so clean"],
    ["griduser", "what setup u running"],
    ["strinova_main", "nice read on that peek"],
    ["wt_pilot", "good positioning there"],
    ["nfs_drift", "smooth line through that corner"]
  ];
  const feed = document.getElementById('feed');

  function pushMsg(){
    if(!DEMO) return;
    const [u, t] = sample[Math.floor(Math.random()*sample.length)];
    const el = document.createElement('div');
    el.className = 'msg';
    el.innerHTML = `<span class="user">${u}</span><span class="text">${t}</span>`;
    feed.appendChild(el);
    feed.scrollTop = feed.scrollHeight;
    while(feed.children.length > 16) feed.removeChild(feed.firstChild);
  }
  if(DEMO){
    for(let i=0;i<5;i++) setTimeout(pushMsg, i*350);
    setInterval(pushMsg, 2800);
  }
</script>
</body>
</html>
